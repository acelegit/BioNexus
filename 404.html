<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Pagina nu a fost găsită · BioNexus</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/png" sizes="64x64" href="images/favicon-64.png" />
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        color: #e2e8f0;
        background:
          radial-gradient(120% 90% at 50% 8%, #1a1443 0%, #120c2e 45%, #0a0819 100%);
      }
      .wrap {
        max-width: 460px;
      }
      .code {
        font-size: clamp(72px, 18vw, 128px);
        font-weight: 800;
        line-height: 1;
        letter-spacing: -2px;
        background: linear-gradient(135deg, #a78bfa, #6366f1);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      h1 {
        font-size: 20px;
        font-weight: 700;
        margin: 14px 0 8px;
      }
      p {
        color: #94a3b8;
        font-size: 14px;
        line-height: 1.6;
        margin-bottom: 24px;
      }
      a.home {
        display: inline-block;
        padding: 12px 24px;
        border-radius: 12px;
        font-weight: 700;
        font-size: 14px;
        color: #fff;
        text-decoration: none;
        background: linear-gradient(135deg, #8b5cf6, #6366f1);
        box-shadow: 0 8px 24px rgba(99, 102, 241, 0.35);
        transition: transform 0.18s;
      }
      a.home:hover {
        transform: translateY(-2px);
      }
      .brand {
        margin-top: 28px;
        font-size: 12px;
        letter-spacing: 2px;
        color: #64748b;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="code">404</div>
      <h1>Pagina nu a fost găsită</h1>
      <p>Structura pe care o cauți nu există sau a fost mutată. Hai înapoi la modelele 3D.</p>
      <a class="home" href="/">&larr; Înapoi la BioNexus</a>
      <div class="brand">BioNexus · Anatomie 3D</div>
    </div>
  </body>
</html>
